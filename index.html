<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>매도 모니터링</title>
<style>
:root {
  --bg: #0d1117; --card: #161b22; --border: #30363d;
  --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
  --green: #3fb950; --yellow: #d29922; --orange: #db6d28; --red: #f85149;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text);
  padding: 12px; max-width: 600px; margin: 0 auto;
  -webkit-text-size-adjust: 100%;
}
.header {
  text-align: center; padding: 16px 0 8px;
  border-bottom: 1px solid var(--border); margin-bottom: 12px;
}
.header h1 { font-size: 18px; font-weight: 600; }
.header .time { font-size: 13px; color: var(--muted); margin-top: 4px; }
.stock-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px; margin-bottom: 12px;
}
.stock-title {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 10px;
}
.stock-code { font-size: 17px; font-weight: 700; }
.stock-price { font-size: 15px; font-weight: 600; }
.price-up { color: var(--red); }
.price-down { color: var(--accent); }
.price-flat { color: var(--muted); }
.buy-row {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 12px; padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.buy-row label { font-size: 13px; color: var(--muted); white-space: nowrap; }
.buy-input {
  flex: 1; background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); padding: 8px 10px;
  font-size: 15px; text-align: right; outline: none;
  -webkit-appearance: none;
}
.buy-input:focus { border-color: var(--accent); }
.buy-pct { font-size: 13px; font-weight: 600; min-width: 60px; text-align: right; }
.strategy-row {
  display: flex; align-items: center; padding: 6px 0;
  border-bottom: 1px solid rgba(48,54,61,0.5);
}
.strategy-row:last-of-type { border-bottom: none; }
.strat-label { font-size: 12px; font-weight: 600; width: 28px; flex-shrink: 0; }
.strat-name { font-size: 12px; color: var(--muted); width: 58px; flex-shrink: 0; }
.strat-bar-wrap {
  flex: 1; height: 8px; background: rgba(255,255,255,0.06);
  border-radius: 4px; overflow: hidden; margin: 0 8px;
}
.strat-bar {
  height: 100%; border-radius: 4px;
  transition: width 0.4s ease, background 0.4s ease;
}
.strat-pct { font-size: 13px; font-weight: 600; width: 38px; text-align: right; flex-shrink: 0; }
.strat-status { font-size: 11px; color: var(--muted); padding: 2px 0 4px 86px; }
.composite-row {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 12px; padding-top: 10px;
  border-top: 2px solid var(--border);
}
.composite-label { font-size: 14px; font-weight: 600; }
.composite-value { font-size: 22px; font-weight: 800; }
.composite-stars { font-size: 16px; letter-spacing: 2px; }
.alert-badge {
  display: inline-block; padding: 3px 10px; border-radius: 6px;
  font-size: 12px; font-weight: 700; margin-left: 8px;
}
.alert-strong { background: var(--red); color: #fff; }
.alert-warn { background: var(--orange); color: #fff; }
.weight-info {
  font-size: 11px; color: var(--muted); margin-top: 6px; text-align: right;
}
.no-data {
  text-align: center; padding: 40px 16px; color: var(--muted); font-size: 14px;
}
.footer {
  text-align: center; padding: 16px 0; color: var(--muted); font-size: 11px;
}
</style>
</head>

<!-- ===== JS: 기술적 지표 + 전략 계산 ===== -->
<script>
"use strict";

// ── 지표 계산 ───────────────────────────────────────────
function calcRSI(closes, period) {
  period = period || 14;
  const n = closes.length;
  const rsi = new Array(n).fill(NaN);
  if (n < period + 1) return rsi;

  let avgGain = 0, avgLoss = 0;
  for (let i = 0; i < period; i++) {
    const d = closes[i + 1] - closes[i];
    if (d > 0) avgGain += d; else avgLoss += -d;
  }
  avgGain /= period;
  avgLoss /= period;

  rsi[period] = avgLoss === 0 ? 100 : 100 - 100 / (1 + avgGain / avgLoss);

  for (let i = period; i < n - 1; i++) {
    const d = closes[i + 1] - closes[i];
    avgGain = (avgGain * (period - 1) + (d > 0 ? d : 0)) / period;
    avgLoss = (avgLoss * (period - 1) + (d < 0 ? -d : 0)) / period;
    rsi[i + 1] = avgLoss === 0 ? 100 : 100 - 100 / (1 + avgGain / avgLoss);
  }
  return rsi;
}

function calcMA(closes, period) {
  period = period || 20;
  const n = closes.length;
  const ma = new Array(n).fill(NaN);
  for (let i = period - 1; i < n; i++) {
    let sum = 0;
    for (let j = i - period + 1; j <= i; j++) sum += closes[j];
    ma[i] = sum / period;
  }
  return ma;
}

// ── 전략 A: 분할매도 ───────────────────────────────────
function strategyA(candles, buyPrice) {
  const r = { prob: 0, status: "대기", detail: "" };
  if (!candles.length || buyPrice <= 0) return r;

  const closes = candles.map(c => c.close);
  const highs = candles.map(c => c.high);
  const curPrice = closes[closes.length - 1];
  const ma20 = calcMA(closes, 20);
  const curMA = ma20[ma20.length - 1];
  const pct = (curPrice - buyPrice) / buyPrice * 100;
  const target3 = buyPrice * 1.03;
  const hit3 = highs.some(h => h >= target3);

  if (hit3) {
    if (!isNaN(curMA) && curMA > 0 && curPrice < curMA) {
      r.prob = 95;
      r.status = "2차 매도 (MA20 이탈)";
      r.detail = "3% 도달 + MA20(" + fmt(curMA) + ") 이탈";
    } else if (!isNaN(curMA) && curMA > 0) {
      const gap = (curPrice - curMA) / curMA * 100;
      if (gap < 0.5) {
        r.prob = 70; r.status = "MA20 근접 주의";
        r.detail = "3% 도달, MA20까지 " + gap.toFixed(1) + "%";
      } else {
        r.prob = 50; r.status = "1차 매도 완료, 2차 대기";
        r.detail = "3% 도달, MA20(" + fmt(curMA) + ") 위 유지";
      }
    } else {
      r.prob = 40; r.status = "1차 매도 완료, MA 미형성";
      r.detail = "3% 도달, MA20 데이터 부족";
    }
  } else {
    if (pct >= 2) {
      r.prob = 30; r.status = "+" + pct.toFixed(1) + "% (3% 접근중)";
      r.detail = "목표 +3%(" + fmt(target3) + ")까지 " + (3 - pct).toFixed(1) + "%";
    } else if (pct >= 0) {
      r.prob = 10; r.status = "+" + pct.toFixed(1) + "% (대기)";
      r.detail = "목표 +3%(" + fmt(target3) + ")";
    } else {
      if (!isNaN(curMA) && curMA > 0 && curPrice < curMA) {
        r.prob = 60; r.status = pct.toFixed(1) + "% + MA20 이탈";
        r.detail = "손실 중 + MA20(" + fmt(curMA) + ") 하회";
      } else {
        r.prob = 15; r.status = pct.toFixed(1) + "% (대기)";
        r.detail = "손실 중, MA20 위 유지";
      }
    }
  }
  return r;
}

// ── 전략 B: RSI 매도 ───────────────────────────────────
function strategyB(candles, buyPrice) {
  const r = { prob: 0, status: "대기", detail: "" };
  if (!candles.length || buyPrice <= 0) return r;

  const closes = candles.map(c => c.close);
  const rsi = calcRSI(closes, 14);

  let curRSI = 50;
  for (let i = rsi.length - 1; i >= 0; i--) {
    if (!isNaN(rsi[i])) { curRSI = rsi[i]; break; }
  }

  const wasAbove70 = rsi.some(v => !isNaN(v) && v >= 70);

  if (wasAbove70 && curRSI < 70) {
    if (curRSI < 60) {
      r.prob = 90; r.status = "매도 신호 (RSI 급락)";
      r.detail = "RSI " + curRSI.toFixed(1) + " (70 돌파 후 하락)";
    } else {
      r.prob = 75; r.status = "매도 신호 (RSI 하락전환)";
      r.detail = "RSI " + curRSI.toFixed(1) + " (70 아래로 전환)";
    }
  } else if (curRSI >= 75) {
    r.prob = 55; r.status = "과매수 경고";
    r.detail = "RSI " + curRSI.toFixed(1) + " (75+)";
  } else if (curRSI >= 70) {
    r.prob = 40; r.status = "RSI 70 돌파";
    r.detail = "RSI " + curRSI.toFixed(1);
  } else if (curRSI >= 60) {
    r.prob = 15; r.status = "RSI " + curRSI.toFixed(1) + " (양호)";
    r.detail = "과매수 아님";
  } else if (curRSI >= 40) {
    r.prob = 10; r.status = "RSI " + curRSI.toFixed(1) + " (중립)";
    r.detail = "매도 신호 없음";
  } else {
    r.prob = 20; r.status = "RSI " + curRSI.toFixed(1) + " (과매도)";
    r.detail = "과매도 구간 — 반등 가능";
  }
  return r;
}

// ── 전략 C: MA 이탈 ────────────────────────────────────
function strategyC(candles, buyPrice) {
  const r = { prob: 0, status: "대기", detail: "" };
  if (!candles.length || buyPrice <= 0) return r;

  const closes = candles.map(c => c.close);
  const ma20 = calcMA(closes, 20);
  const curPrice = closes[closes.length - 1];
  const curMA = ma20[ma20.length - 1];

  if (isNaN(curMA) || curMA <= 0) {
    r.prob = 5; r.status = "MA20 미형성";
    r.detail = "5분봉 20개 미만";
    return r;
  }

  let belowCount = 0;
  for (let i = closes.length - 1; i >= 0; i--) {
    if (isNaN(ma20[i])) break;
    if (closes[i] < ma20[i]) belowCount++; else break;
  }

  const gap = (curPrice - curMA) / curMA * 100;

  if (belowCount >= 3) {
    r.prob = 90; r.status = "MA20 이탈 " + belowCount + "봉 연속";
    r.detail = "MA20(" + fmt(curMA) + ") 대비 " + (gap >= 0 ? "+" : "") + gap.toFixed(1) + "%";
  } else if (belowCount === 2) {
    r.prob = 75; r.status = "MA20 이탈 2봉 (매도 신호)";
    r.detail = "MA20(" + fmt(curMA) + ") 대비 " + (gap >= 0 ? "+" : "") + gap.toFixed(1) + "%";
  } else if (belowCount === 1) {
    r.prob = 45; r.status = "MA20 이탈 1봉 (주의)";
    r.detail = "MA20(" + fmt(curMA) + ") 대비 " + (gap >= 0 ? "+" : "") + gap.toFixed(1) + "%";
  } else if (gap < 0.3) {
    r.prob = 30; r.status = "MA20 근접";
    r.detail = "MA20(" + fmt(curMA) + ")까지 " + (gap >= 0 ? "+" : "") + gap.toFixed(1) + "%";
  } else {
    r.prob = 10; r.status = "MA20 위 유지";
    r.detail = "MA20(" + fmt(curMA) + ") 대비 +" + gap.toFixed(1) + "%";
  }
  return r;
}

// ── 전략 D: 분할 트레일링 ──────────────────────────────
function strategyD(candles, buyPrice) {
  const r = { prob: 0, status: "대기", detail: "", peakPrice: 0, trailingStop: 0 };
  if (!candles.length || buyPrice <= 0) return r;

  const closes = candles.map(c => c.close);
  const highs = candles.map(c => c.high);
  const curPrice = closes[closes.length - 1];
  const pct = (curPrice - buyPrice) / buyPrice * 100;
  const target = buyPrice * 1.03;
  const trailingPct = 3.0;
  const cooldownBars = 3;

  const peakPrice = Math.max(...highs);
  r.peakPrice = peakPrice;
  const trailingStop = peakPrice * (1 - trailingPct / 100);
  r.trailingStop = trailingStop;

  const hitTarget = highs.some(h => h >= target);

  if (!hitTarget) {
    if (pct >= 2) {
      r.prob = 20; r.status = "+" + pct.toFixed(1) + "% (3% 접근중)";
      r.detail = "목표 +3%(" + fmt(target) + ")까지 " + (3 - pct).toFixed(1) + "%";
    } else if (pct >= 0) {
      r.prob = 5; r.status = "+" + pct.toFixed(1) + "% (대기)";
      r.detail = "목표 +3% 미도달";
    } else {
      r.prob = 10; r.status = pct.toFixed(1) + "% (손실)";
      r.detail = "목표 +3% 미도달, 손실 중";
    }
    return r;
  }

  // 3% 도달 후 트레일링
  if (curPrice <= trailingStop) {
    let barsBelow = 0;
    for (let i = closes.length - 1; i >= 0; i--) {
      if (closes[i] <= trailingStop) barsBelow++; else break;
    }
    if (barsBelow >= cooldownBars) {
      r.prob = 95; r.status = "트레일링 스탑 발동 (" + barsBelow + "봉)";
      r.detail = "고점 " + fmt(peakPrice) + " → 스탑 " + fmt(trailingStop) + " 이탈";
    } else {
      r.prob = 65; r.status = "스탑 이하 " + barsBelow + "봉 (대기 " + (cooldownBars - barsBelow) + "봉)";
      r.detail = "고점 " + fmt(peakPrice) + " → 스탑 " + fmt(trailingStop) + ", 반등 가능";
    }
  } else {
    const drop = (peakPrice - curPrice) / peakPrice * 100;
    if (drop >= 2) {
      r.prob = 45; r.status = "고점 대비 -" + drop.toFixed(1) + "% (주의)";
      r.detail = "고점 " + fmt(peakPrice) + " → 스탑 " + fmt(trailingStop) + "까지 " + (trailingPct - drop).toFixed(1) + "%";
    } else if (drop >= 1) {
      r.prob = 25; r.status = "고점 대비 -" + drop.toFixed(1) + "%";
      r.detail = "1/3 매도 완료, 스탑 " + fmt(trailingStop);
    } else {
      r.prob = 15; r.status = "고점 근처 유지";
      r.detail = "1/3 매도 완료, 고점 " + fmt(peakPrice) + " 부근";
    }
  }
  return r;
}

// ── 종합 확률 ──────────────────────────────────────────
function compositeProb(a, b, c, d, wa, wb, wc, wd) {
  wa = wa || 0.25; wb = wb || 0.20; wc = wc || 0.20; wd = wd || 0.35;
  return Math.round(a * wa + b * wb + c * wc + d * wd);
}

// ── 유틸 ───────────────────────────────────────────────
function fmt(n) { return Math.round(n).toLocaleString("ko-KR"); }

function probColor(p) {
  if (p >= 70) return "var(--red)";
  if (p >= 50) return "var(--orange)";
  if (p >= 30) return "var(--yellow)";
  return "var(--green)";
}

function stars(p) {
  const filled = Math.round(p / 100 * 5);
  return "\u2605".repeat(filled) + "\u2606".repeat(5 - filled);
}

// ── 렌더링 ─────────────────────────────────────────────
function renderAll() {
  const raw = document.getElementById("stock-data").textContent;
  let data;
  try { data = JSON.parse(raw); } catch (e) { return; }

  if (!data.stocks || !data.stocks.length) {
    document.getElementById("stocks-container").innerHTML =
      '<div class="no-data">모니터링 데이터가 없습니다</div>';
    return;
  }

  document.getElementById("update-time").textContent =
    "업데이트: " + (data.updated_at || "-");

  const container = document.getElementById("stocks-container");
  container.innerHTML = "";

  data.stocks.forEach((stock, idx) => {
    const card = document.createElement("div");
    card.className = "stock-card";
    card.dataset.idx = idx;

    const curPrice = stock.cur_price || 0;
    const candles = stock.candles_5m || [];

    // 저장된 매수가 or 시가
    const defaultBuy = stock.default_buy || (candles.length ? candles[0].open : 0);

    card.innerHTML = buildCardHTML(stock, idx, curPrice, defaultBuy);
    container.appendChild(card);

    // 매수가 입력 이벤트
    const input = card.querySelector(".buy-input");
    if (input) {
      input.addEventListener("input", function () {
        recalc(idx, parseFloat(this.value) || 0);
      });
      // 초기 계산
      recalc(idx, defaultBuy);
    }
  });
}

function buildCardHTML(stock, idx, curPrice, defaultBuy) {
  return '' +
    '<div class="stock-title">' +
      '<span class="stock-code">' + stock.code + (stock.name ? ' ' + stock.name : '') + '</span>' +
      '<span class="stock-price">' + fmt(curPrice) + '원</span>' +
    '</div>' +
    '<div class="buy-row">' +
      '<label>매수가</label>' +
      '<input type="number" class="buy-input" value="' + Math.round(defaultBuy) + '" placeholder="매수가 입력" inputmode="numeric">' +
      '<span class="buy-pct" id="pct-' + idx + '">-</span>' +
    '</div>' +
    '<div id="strats-' + idx + '"></div>' +
    '<div class="composite-row">' +
      '<span class="composite-label">종합 매도</span>' +
      '<span>' +
        '<span class="composite-stars" id="stars-' + idx + '"></span>' +
        '<span class="composite-value" id="comp-' + idx + '">-</span>' +
        '<span id="alert-' + idx + '"></span>' +
      '</span>' +
    '</div>' +
    '<div class="weight-info">가중치 A:25% B:20% C:20% D:35%</div>';
}

function recalc(idx, buyPrice) {
  const raw = JSON.parse(document.getElementById("stock-data").textContent);
  const stock = raw.stocks[idx];
  const candles = stock.candles_5m || [];
  const curPrice = stock.cur_price || 0;

  // 수익률
  const pctEl = document.getElementById("pct-" + idx);
  if (buyPrice > 0 && curPrice > 0) {
    const pct = (curPrice - buyPrice) / buyPrice * 100;
    pctEl.textContent = (pct >= 0 ? "+" : "") + pct.toFixed(1) + "%";
    pctEl.style.color = pct > 0 ? "var(--red)" : pct < 0 ? "var(--accent)" : "var(--muted)";
  } else {
    pctEl.textContent = "-";
    pctEl.style.color = "var(--muted)";
  }

  // 전략 계산
  const sa = strategyA(candles, buyPrice);
  const sb = strategyB(candles, buyPrice);
  const sc = strategyC(candles, buyPrice);
  const sd = strategyD(candles, buyPrice);
  const comp = compositeProb(sa.prob, sb.prob, sc.prob, sd.prob);

  // 전략별 표시
  const strategies = [
    { label: "A", name: "분할매도", data: sa },
    { label: "B", name: "RSI", data: sb },
    { label: "C", name: "MA이탈", data: sc },
    { label: "D", name: "트레일링", data: sd },
  ];

  let html = "";
  strategies.forEach(s => {
    const color = probColor(s.data.prob);
    html += '<div class="strategy-row">' +
      '<span class="strat-label" style="color:' + color + '">' + s.label + '</span>' +
      '<span class="strat-name">' + s.name + '</span>' +
      '<div class="strat-bar-wrap"><div class="strat-bar" style="width:' + s.data.prob + '%;background:' + color + '"></div></div>' +
      '<span class="strat-pct" style="color:' + color + '">' + s.data.prob + '%</span>' +
    '</div>';
    if (s.data.status && s.data.status !== "대기") {
      html += '<div class="strat-status">' + s.data.status;
      if (s.data.detail) html += ' — ' + s.data.detail;
      html += '</div>';
    }
  });
  document.getElementById("strats-" + idx).innerHTML = html;

  // 종합
  const compColor = probColor(comp);
  document.getElementById("comp-" + idx).textContent = comp + "%";
  document.getElementById("comp-" + idx).style.color = compColor;
  document.getElementById("stars-" + idx).textContent = stars(comp) + " ";
  document.getElementById("stars-" + idx).style.color = compColor;

  const alertEl = document.getElementById("alert-" + idx);
  if (comp >= 70) {
    alertEl.innerHTML = '<span class="alert-badge alert-strong">매도 강력</span>';
  } else if (comp >= 50) {
    alertEl.innerHTML = '<span class="alert-badge alert-warn">매도 고려</span>';
  } else {
    alertEl.innerHTML = "";
  }
}

// ── 초기화 ─────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", renderAll);
</script>
